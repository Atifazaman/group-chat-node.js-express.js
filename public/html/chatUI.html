<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Chat UI</title>
<link rel="stylesheet" href="../css/chat.css">
</head>
<body>

   
  <div class="container">
   

  <!-- Left Search Sidebar -->

    <div class="sidebar">

    <div class="sidebar-header">
      Find User By Email
    </div>

    <div class="search-box">
      <form id="searchForm">
        <input type="email" id="emailInput" placeholder="Enter email" />
        <button type="submit">Search</button>
        <button type="button" id="createGroupBtn" >Create Group </button>
      </form>
    </div>

<div id="groupList"></div>
     
    <div id="userList" class="search-results">

      <!-- Demo Users -->
    
      </div>

    </div>

  </div>


   <!-- Chat Area -->
  

  <div class="chat-container">

    <div class="chat-header">
      <div class="avatar">A</div>

      <div class="user-info">
        <h3>ALL</h3>
      </div>
    </div>

    <div class="chat-box" id="chatBox">

      <div class="message received">
        Hey 👋
        <span class="time">10:21 AM</span>
      </div>

      <div class="message sent">
        Hi! This UI looks cool 😎
        <span class="time">10:22 AM</span>
      </div>

      <div class="message received">
        Try sending a message below.
        <span class="time">10:23 AM</span>
      </div>

    </div>

    <form class="chat-input" id="chatForm">
      <input 
        type="text" 
        id="messageInput"
        placeholder="Type a message..."
        autocomplete="off"
      />

      <button type="submit">➤</button>
    </form>

  </div>

</div>

<div id="memberModal" class="modal">
  <div class="modal-content">

    <h3>Add Member</h3>

    <input
      type="text"
      id="memberSearch"
      placeholder="Search user..."
    >

     <div id="suggestions"></div>

    <button id="closeModal">Close</button>

  </div>
</div>

<script src="http://localhost:3000/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/public/js/chat.js"></script>

</body>
</html>
